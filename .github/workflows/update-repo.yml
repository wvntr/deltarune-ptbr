name: Gerar Manifesto e Progresso após uma Update

on:
  push:
    branches:
      - main-dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Calcular Progresso e Atualizar README
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          function calcularProgresso(capNum) {
            const origDir = `original/chapter-0${capNum}`;
            const tranDir = `translated/chapter-0${capNum}`;
            
            if (!fs.existsSync(origDir)) return 0;
            
            let totalLinhas = 0;
            let traduzidas = 0;

            function scan(dir) {
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                if (fs.statSync(fullPath).isDirectory()) {
                  scan(fullPath);
                } else if (file.endsWith('.json')) {
                  const relative = path.relative(origDir, fullPath);
                  const destPath = path.join(tranDir, relative);
                  
                  try {
                    const origData = JSON.parse(fs.readFileSync(fullPath, 'utf8'));
                    const tranData = fs.existsSync(destPath) ? JSON.parse(fs.readFileSync(destPath, 'utf8')) : {};
                    
                    const origStrings = origData.Strings || [];
                    const tranStrings = tranData.Strings || [];
                    
                    for (let i = 0; i < origStrings.length; i++) {
                      const origText = origStrings[i];
                      const tranText = tranStrings[i];
                      
                      // Ignora strings vazias ou nulas
                      if (origText && origText.trim() !== '') {
                        totalLinhas++;
                        if (tranText && tranText !== origText) {
                          traduzidas++;
                        }
                      }
                    }
                  } catch (e) {
                    console.log(`erro em ${file}: ${e.message}`);
                  }
                }
              }
            }

            scan(origDir);
            return totalLinhas === 0 ? 0 : parseFloat(((traduzidas / totalLinhas) * 100).toFixed(2));
          }

          const progressos = {};
          for (let i = 1; i <= 5; i++) {
            progressos[i] = calcularProgresso(i);
            console.log(`Capítulo ${i}: ${progressos[i]}%`);
          }

          let readme = fs.readFileSync('README.md', 'utf8');
          for (const [cap, progresso] of Object.entries(progressos)) {
            const regex = new RegExp(`(\\|\\s*Capítulo ${cap}\\s*\\|)\\s*[\\d\\.]+%?\\s*(\\|)`, 'g');
            readme = readme.replace(regex, `$1   ${progresso}%   $2`);
          }
          fs.writeFileSync('README.md', readme, 'utf8');

    - name: Hash-Calc
      run: |
        echo "{" > manifest.json
        echo "  \"files\": [" >> manifest.json
        
        FIRST=true
        
        while read -r arquivo; do
          HASH=$(md5sum "$arquivo" | awk '{print $1}')
          
          if [ "$FIRST" = true ]; then
            FIRST=false
          else
            echo "," >> manifest.json
          fi
          
          echo "    { \"path\": \"$arquivo\", \"hash\": \"$HASH\" }" | tr -d '\n' >> manifest.json
        done < <(find translated -type f)
        
        echo "" >> manifest.json
        echo "  ]" >> manifest.json
        echo "}" >> manifest.json

    - name: Commit e Push das Alterações
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        git add README.md manifest.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizado progresso de tradução e manifest.json" && git push)